spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: PUBLIC
  flyway:
    enabled: false

jwt:
  secret: testSecretKeyThatIsAtLeast256BitsLongForHS256AlgorithmInTests!!
  expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
